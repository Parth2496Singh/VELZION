version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: velzion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: velzion_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    build:
      context: .
      dockerfile: n8n.Dockerfile
    user: "node"
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - NODES_EXCLUDE=[] # Required to enable the Execute Command node
      # AWS Credentials for Terraform
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - n8n_data:/home/node/.n8n
      - ./terraform:/home/node/terraform # We will put our .tf files here
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  postgres_data:
  n8n_data: