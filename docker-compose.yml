version: '3.8'

services:
  # 1. The n8n Orchestrator (Stateless, connected to external DB)
  n8n:
    build:
      context: ./backend
      dockerfile: n8n.Dockerfile
    container_name: velzion-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      # Mount terraform for local rapid development (no need to rebuild)
      - ./backend/terraform:/home/node/terraform

  # 2. The Django Control Plane (Stateless, connected to external DB)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velzion-django
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: python manage.py runserver 0.0.0.0:8000

  # 3. The React SPA (Vite Development Server)
  frontend:
    image: node:20-alpine
    working_dir: /app
    container_name: velzion-react
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    stdin_open: true  
    tty: true 
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app          
      - /app/node_modules      
    command: sh -c "npm install && npm run dev"  

# 🛑 NO VOLUMES DEFINED! 
# We rely entirely on the external database for state persistence.